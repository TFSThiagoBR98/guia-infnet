apiVersion: v1
kind: Pod
metadata:
  name: pvc-writer
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: alpine:latest
      command:
        - /bin/sh
        - -c
        - |
          echo "Arquivo criado em $(date)" > /data/registro.txt
          echo "Projeto guia-infnet com PVC de 2Gi funcionando corretamente" >> /data/registro.txt
          sleep 3600
      volumeMounts:
        - name: guia-volume
          mountPath: /data
  volumes:
    - name: guia-volume
      persistentVolumeClaim:
        claimName: guia-infnet-pvc